<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b1e"/>
      <stop offset="100%" stop-color="#0a2e22"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10241f"/>
      <stop offset="100%" stop-color="#0c1815"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- code rain decoration -->
  <g fill="#3DDC84" opacity="0.06" font-family="Courier New, monospace" font-size="13">
    <text x="20" y="40">01001 fun main()</text>
    <text x="20" y="60">class MainActivity</text>
    <text x="20" y="80">val intent = Intent</text>
    <text x="20" y="100">override fun onCreate</text>
    <text x="20" y="320">setContentView(R.layout)</text>
    <text x="20" y="340">viewModel.observe(this)</text>
    <text x="20" y="360">Firebase.auth.currentUser</text>
    <text x="600" y="40">git commit -m "feat:"</text>
    <text x="600" y="60">npm run build</text>
    <text x="610" y="340">retrofit.create(Api::class)</text>
    <text x="610" y="360">flutter pub get</text>
  </g>

  <!-- phone body -->
  <rect x="300" y="30" width="200" height="380" rx="28" fill="#0a0a0a" stroke="#1f2b27" stroke-width="3"/>
  <rect x="312" y="50" width="176" height="340" rx="6" fill="url(#screen)"/>

  <!-- notch -->
  <rect x="372" y="50" width="56" height="14" rx="7" fill="#0a0a0a"/>

  <!-- status bar -->
  <text x="324" y="68" fill="#cfe9d8" font-family="Arial, sans-serif" font-size="9">9:41</text>
  <text x="460" y="68" fill="#cfe9d8" font-family="Arial, sans-serif" font-size="9">100%</text>

  <!-- home screen label -->
  <text x="400" y="92" fill="#9fd8b3" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" letter-spacing="2">NOMAN'S BUILDS</text>

  <!-- app grid: 3 cols x 3 rows -->
  <!-- row 1 -->
  <g>
    <rect x="324" y="106" width="44" height="44" rx="11" fill="#3DDC84"/>
    <path d="M338 124 l8 -10 l8 10 M346 114 v18" stroke="#0a1f15" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="346" y="158" fill="#cfe9d8" font-family="Arial, sans-serif" font-size="7.5" text-anchor="middle">TravelBuddy</text>
  </g>
  <g>
    <rect x="378" y="106" width="44" height="44" rx="11" fill="#2C5364"/>
    <rect x="392" y="118" width="20" height="20" rx="3" fill="none" stroke="#cfe9d8" stroke-width="2"/>
    <line x1="396" y1="124" x2="408" y2="124" stroke="#cfe9d8" stroke-width="1.5"/>
    <line x1="396" y1="130" x2="404" y2="130" stroke="#cfe9d8" stroke-width="1.5"/>
    <text x="400" y="158" fill="#cfe9d8" font-family="Arial, sans-serif" font-size="7.5" text-anchor="middle">POSAPP</text>
  </g>
  <g>
    <rect x="432" y="106" width="44" height="44" rx="11" fill="#0F9D58"/>
    <rect x="446" y="116" width="16" height="24" rx="2" fill="none" stroke="#0a1f15" stroke-width="2"/>
    <circle cx="454" cy="135" r="1.5" fill="#0a1f15"/>
    <text x="454" y="158" fill="#cfe9d8" font-family="Arial, sans-serif" font-size="7.5" text-anchor="middle">CarLynk</text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="324" y="172" width="44" height="44" rx="11" fill="#1d6b4a"/>
    <circle cx="346" cy="194" r="11" fill="none" stroke="#cfe9d8" stroke-width="2"/>
    <line x1="346" y1="186" x2="346" y2="194" stroke="#cfe9d8" stroke-width="2" stroke-linecap="round"/>
    <line x1="346" y1="194" x2="351" y2="197" stroke="#cfe9d8" stroke-width="2" stroke-linecap="round"/>
    <text x="346" y="224" fill="#cfe9d8" font-family="Arial, sans-serif" font-size="7.5" text-anchor="middle">SolarAlign</text>
  </g>
  <g>
    <rect x="378" y="172" width="44" height="44" rx="11" fill="#3DDC84"/>
    <path d="M392 200 h20 M392 194 h14 M392 188 h20" stroke="#0a1f15" stroke-width="2" stroke-linecap="round"/>
    <text x="400" y="224" fill="#cfe9d8" font-family="Arial, sans-serif" font-size="7" text-anchor="middle">TenderAI</text>
  </g>
  <g>
    <rect x="432" y="172" width="44" height="44" rx="11" fill="#2C5364"/>
    <path d="M448 188 v16 M448 188 l6 4 M448 196 l-6 4" stroke="#cfe9d8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="454" y="224" fill="#cfe9d8" font-family="Arial, sans-serif" font-size="7" text-anchor="middle">Spotify Clone</text>
  </g>

  <!-- row 3: more coming -->
  <g opacity="0.5">
    <rect x="324" y="238" width="44" height="44" rx="11" fill="none" stroke="#3DDC84" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="346" y="263" fill="#3DDC84" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">+</text>
    <text x="346" y="290" fill="#7fae8f" font-family="Arial, sans-serif" font-size="6.5" text-anchor="middle">8 more</text>
  </g>
  <g opacity="0.5">
    <rect x="378" y="238" width="44" height="44" rx="11" fill="none" stroke="#3DDC84" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="400" y="263" fill="#3DDC84" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">+</text>
    <text x="400" y="290" fill="#7fae8f" font-family="Arial, sans-serif" font-size="6.5" text-anchor="middle">uploading</text>
  </g>
  <g opacity="0.5">
    <rect x="432" y="238" width="44" height="44" rx="11" fill="none" stroke="#3DDC84" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="454" y="263" fill="#3DDC84" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">+</text>
    <text x="454" y="290" fill="#7fae8f" font-family="Arial, sans-serif" font-size="6.5" text-anchor="middle">live now</text>
  </g>

  <!-- dock -->
  <rect x="316" y="358" width="168" height="2" fill="#1f2b27"/>
  <circle cx="346" cy="375" r="13" fill="#3DDC84" opacity="0.9"/>
  <circle cx="400" cy="375" r="13" fill="#2C5364" opacity="0.9"/>
  <circle cx="454" cy="375" r="13" fill="#0F9D58" opacity="0.9"/>

  <!-- left side text -->
  <text x="40" y="160" fill="#e8f5ec" font-family="Arial, sans-serif" font-size="26" font-weight="bold">Muhammad Noman</text>
  <text x="40" y="190" fill="#e8f5ec" font-family="Arial, sans-serif" font-size="26" font-weight="bold">Ashraf</text>
  <text x="40" y="222" fill="#3DDC84" font-family="Courier New, monospace" font-size="14">Android · Flutter · Full-Stack</text>
  <text x="40" y="248" fill="#7fae8f" font-family="Arial, sans-serif" font-size="13">14+ projects in active deployment</text>

  <!-- right side text -->
  <text x="540" y="160" fill="#e8f5ec" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Final-year CS student</text>
  <text x="540" y="180" fill="#7fae8f" font-family="Arial, sans-serif" font-size="12">University of Gujrat</text>
  <text x="540" y="210" fill="#e8f5ec" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Open to internships</text>
  <text x="540" y="230" fill="#7fae8f" font-family="Arial, sans-serif" font-size="12">&amp; junior dev roles</text>

  <text x="540" y="270" fill="#3DDC84" font-family="Courier New, monospace" font-size="11">$ git log --author=noman</text>
  <text x="540" y="288" fill="#7fae8f" font-family="Courier New, monospace" font-size="11">--oneline | wc -l</text>
  <text x="540" y="306" fill="#cfe9d8" font-family="Courier New, monospace" font-size="11">&gt; still counting...</text>
</svg>
